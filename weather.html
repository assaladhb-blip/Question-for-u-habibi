<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    .search-container {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    .search-container input {
      flex: 1;
      padding: 12px 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .search-container button {
      padding: 12px 25px;
      background: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .search-container button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .main-card {
      background: white;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .city-name {
      font-size: 28px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }

    .current-weather {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .weather-icon {
      font-size: 80px;
      margin-right: 30px;
    }

    .weather-info {
      flex: 1;
    }

    .temperature {
      font-size: 56px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }

    .description {
      font-size: 18px;
      color: #666;
      text-transform: capitalize;
      margin-bottom: 15px;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid #f0f0f0;
    }

    .detail-item {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .detail-label {
      color: #999;
      font-size: 12px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 20px;
      font-weight: bold;
      color: #333;
    }

    .forecast {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .forecast-card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .forecast-day {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
    }

    .forecast-icon {
      font-size: 40px;
      margin: 10px 0;
    }

    .forecast-temp {
      font-size: 16px;
      color: #667eea;
      font-weight: bold;
    }

    .error {
      background: #ff6b6b;
      color: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: white;
      font-size: 18px;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .current-weather {
        flex-direction: column;
        align-items: flex-start;
      }

      .weather-icon {
        margin-right: 0;
        margin-bottom: 20px;
      }

      .temperature {
        font-size: 42px;
      }

      .header h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌤️ Weather Dashboard</h1>
      <p>Get current weather for any city</p>
    </div>

    <div class="search-container">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter city name..."
        autocomplete="off"
      />
      <button onclick="searchWeather()">Search</button>
    </div>

    <div id="errorContainer"></div>
    <div id="mainContent"></div>
  </div>

  <script>
    const API_KEY = 'cd50a896eff50b968577e64d95c9c5be'; // Free API key from Open-Meteo (no key needed) or OpenWeatherMap
    const cityInput = document.getElementById('cityInput');
    const errorContainer = document.getElementById('errorContainer');
    const mainContent = document.getElementById('mainContent');

    // Weather icon mapping
    const iconMap = {
      '01d': '☀️',
      '01n': '🌙',
      '02d': '⛅',
      '02n': '🌤️',
      '03d': '☁️',
      '03n': '☁️',
      '04d': '☁️',
      '04n': '☁️',
      '09d': '🌧️',
      '09n': '🌧️',
      '10d': '🌦️',
      '10n': '🌧️',
      '11d': '⛈️',
      '11n': '⛈️',
      '13d': '❄️',
      '13n': '❄️',
      '50d': '🌫️',
      '50n': '🌫️'
    };

    function showError(message) {
      errorContainer.innerHTML = `<div class="error">❌ ${message}</div>`;
      mainContent.innerHTML = '';
    }

    function showLoading() {
      mainContent.innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p>Fetching weather data...</p>
        </div>
      `;
      errorContainer.innerHTML = '';
    }

    async function getCoordinates(city) {
      try {
        const response = await fetch(
          `https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${API_KEY}`
        );
        const data = await response.json();

        if (!data || data.length === 0) {
          throw new Error('City not found');
        }

        return {
          lat: data[0].lat,
          lon: data[0].lon,
          name: data[0].name,
          country: data[0].country
        };
      } catch (error) {
        throw new Error('Unable to find city');
      }
    }

    async function getWeather(lat, lon) {
      try {
        const response = await fetch(
          `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`
        );
        const data = await response.json();

        if (data.cod !== 200) {
          throw new Error(data.message);
        }

        return data;
      } catch (error) {
        throw new Error('Unable to fetch weather data');
      }
    }

    async function getForecast(lat, lon) {
      try {
        const response = await fetch(
          `https://api.openweathermap.org/data/2.5/forecast?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`
        );
        const data = await response.json();
        return data.list;
      } catch (error) {
        return [];
      }
    }

    function getWeatherIcon(iconCode) {
      return iconMap[iconCode] || '🌤️';
    }

    function formatDate(timestamp) {
      return new Date(timestamp * 1000).toLocaleDateString('en-US', {
        weekday: 'short',
        month: 'short',
        day: 'numeric'
      });
    }

    function getUniqueForecastDays(forecastList) {
      const days = {};
      forecastList.forEach(item => {
        const date = new Date(item.dt * 1000).toLocaleDateString();
        if (!days[date]) {
          days[date] = item;
        }
      });
      return Object.values(days).slice(0, 5);
    }

    async function searchWeather() {
      const city = cityInput.value.trim();

      if (!city) {
        showError('Please enter a city name');
        return;
      }

      showLoading();

      try {
        // Get coordinates
        const coords = await getCoordinates(city);

        // Get current weather
        const weather = await getWeather(coords.lat, coords.lon);

        // Get forecast
        const forecast = await getForecast(coords.lat, coords.lon);
        const forecastDays = getUniqueForecastDays(forecast);

        // Build HTML
        let html = `
          <div class="main-card">
            <div class="city-name">${coords.name}, ${coords.country}</div>

            <div class="current-weather">
              <div class="weather-icon">${getWeatherIcon(weather.weather[0].icon)}</div>
              <div class="weather-info">
                <div class="temperature">${Math.round(weather.main.temp)}°C</div>
                <div class="description">${weather.weather[0].main}</div>
                <div style="color: #999; font-size: 14px; margin-top: 10px;">
                  Feels like ${Math.round(weather.main.feels_like)}°C
                </div>
              </div>
            </div>

            <div class="details-grid">
              <div class="detail-item">
                <div class="detail-label">Humidity</div>
                <div class="detail-value">${weather.main.humidity}%</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Pressure</div>
                <div class="detail-value">${weather.main.pressure} mb</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Wind Speed</div>
                <div class="detail-value">${Math.round(weather.wind.speed * 3.6)} km/h</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Visibility</div>
                <div class="detail-value">${(weather.visibility / 1000).toFixed(1)} km</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">UV Index</div>
                <div class="detail-value">${weather.clouds.all}%</div>
              </div>
              <div class="detail-item">
                <div class="detail-label">Sunrise</div>
                <div class="detail-value">${new Date(weather.sys.sunrise * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</div>
              </div>
            </div>
          </div>
        `;

        // Add forecast if available
        if (forecastDays.length > 0) {
          html += '<div class="main-card"><h2 style="margin-bottom: 20px;">5-Day Forecast</h2><div class="forecast">';
          forecastDays.forEach(day => {
            html += `
              <div class="forecast-card">
                <div class="forecast-day">${formatDate(day.dt)}</div>
                <div class="forecast-icon">${getWeatherIcon(day.weather[0].icon)}</div>
                <div class="forecast-temp">${Math.round(day.main.temp)}°C</div>
              </div>
            `;
          });
          html += '</div></div>';
        }

        mainContent.innerHTML = html;
        errorContainer.innerHTML = '';
      } catch (error) {
        showError(error.message);
      }
    }

    // Allow Enter key to search
    cityInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        searchWeather();
      }
    });

    // Load default city on page load
    cityInput.value = 'London';
    searchWeather();
  </script>
</body>
</html>
