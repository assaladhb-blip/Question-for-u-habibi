<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le vrai choix</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;800&display=swap');

  :root{
    --bg: #0b0713;
    --bg2: #150c26;
    --heart-red: #ff2e4d;
    --dt-yellow: #ffd23f;
    --dt-purple: #7a3ff0;
    --ink: #f4f0ff;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    height:100%;
    background:
      radial-gradient(circle at 20% 10%, #22123f 0%, transparent 40%),
      radial-gradient(circle at 80% 90%, #1a0e33 0%, transparent 45%),
      var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  .stars{
    position:fixed; inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff8, transparent),
      radial-gradient(1px 1px at 80% 30%, #fff6, transparent),
      radial-gradient(2px 2px at 40% 70%, #fff5, transparent),
      radial-gradient(1px 1px at 60% 85%, #fff7, transparent),
      radial-gradient(1px 1px at 90% 60%, #fff4, transparent);
    pointer-events:none;
  }

  .wrap{
    position:relative;
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding: 32px 16px;
    text-align:center;
    gap: 40px;
  }

  h1{
    font-family:'Press Start 2P', monospace;
    font-size: clamp(16px, 4vw, 26px);
    line-height:1.7;
    max-width: 700px;
    text-shadow: 0 0 18px rgba(122,63,240,0.7);
    letter-spacing: 1px;
  }

  h1 span{ color: var(--dt-yellow); }

  .board{
    position:relative;
    width: min(680px, 92vw);
    height: min(320px, 55vh);
  }

  .box{
    position:absolute;
    top:50%;
    width: 240px;
    max-width: 42vw;
    padding: 22px 18px;
    border-radius: 14px;
    font-weight: 800;
    font-size: clamp(14px, 2.4vw, 18px);
    cursor: pointer;
    border: 3px solid transparent;
    user-select:none;
    transform: translateY(-50%);
    transition: box-shadow .15s ease, filter .15s ease;
  }

  .box.good{
    left: 6%;
    background: linear-gradient(160deg, #ff5470, var(--heart-red));
    box-shadow: 0 0 0 rgba(255,46,77,0);
    color:#fff;
  }
  .box.good:hover{
    box-shadow: 0 0 35px rgba(255,46,77,.8);
    filter: brightness(1.08);
  }
  .box.good::before{
    content:"♥";
    display:block;
    font-size: 22px;
    margin-bottom:6px;
  }

  .box.bad{
    right: 6%;
    left: auto;
    background: linear-gradient(160deg, #9a6bff, var(--dt-purple));
    color: #fff;
    position: absolute;
    z-index: 5;
  }
  .box.bad::before{
    content:"◆";
    display:block;
    color: var(--dt-yellow);
    font-size: 20px;
    margin-bottom:6px;
  }

  .caption{
    margin-top: 10px;
    font-size: 13px;
    opacity:.6;
  }

  .winmsg{
    display:none;
    font-family:'Press Start 2P', monospace;
    font-size: clamp(14px, 3vw, 20px);
    color: var(--dt-yellow);
    text-shadow: 0 0 20px rgba(255,210,63,.7);
    max-width: 600px;
  }

  .winmsg.show{ display:block; }

  footer{
    position:fixed;
    bottom:10px;
    font-size:11px;
    opacity:.35;
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="wrap">
    <h1>Est-ce que tu préfères <span>moi</span><br>ou <span>Deltarune</span> ?</h1>

    <div class="board" id="board">
      <div class="box good" id="good">
        Assala, la femme<br>de ta vie
        <div class="caption">clique ici, c'est facile</div>
      </div>

      <div class="box bad" id="bad">
        Deltarune
      </div>
    </div>

    <p class="winmsg" id="win">bon choix. c'était couru d'avance de toute façon.</p>
  </div>

  <footer>essaie d'attraper la case violette si t'y arrives</footer>

<script>
  const board = document.getElementById('board');
  const bad = document.getElementById('bad');
  const good = document.getElementById('good');
  const win = document.getElementById('win');

  function dodge(){
    const bw = board.clientWidth;
    const bh = board.clientHeight;
    const boxW = bad.offsetWidth;
    const boxH = bad.offsetHeight;

    const maxX = Math.max(bw - boxW, 0);
    const maxY = Math.max(bh - boxH, 0);

    const x = Math.random() * maxX;
    const y = Math.random() * maxY + boxH/2;

    bad.style.left = x + 'px';
    bad.style.top = y + 'px';
    bad.style.right = 'auto';
    bad.style.transform = 'translateY(-50%)';
  }

  // fuit dès que la souris s'approche (hover + mousemove sur la zone)
  bad.addEventListener('mouseenter', dodge);
  bad.addEventListener('click', (e) => { e.preventDefault(); dodge(); });

  // version tactile : fuit dès qu'on touche
  bad.addEventListener('touchstart', (e) => {
    e.preventDefault();
    dodge();
  }, { passive:false });

  // anti triche : si la souris passe vite dessus, on check en continu
  board.addEventListener('mousemove', (e) => {
    const r = bad.getBoundingClientRect();
    const dist = Math.hypot(
      e.clientX - (r.left + r.width/2),
      e.clientY - (r.top + r.height/2)
    );
    if (dist < 70) dodge();
  });

  good.addEventListener('click', () => {
    win.classList.add('show');
    good.style.filter = 'brightness(1.2)';
    good.querySelector('.caption').textContent = "meilleur choix de ta vie ✓";
  });
</script>
</body>
</html>
